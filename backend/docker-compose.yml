version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: ygb-postgres
    environment:
      POSTGRES_DB: ygb_db
      POSTGRES_USER: ygb_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
