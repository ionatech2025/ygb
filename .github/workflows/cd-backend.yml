name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    # Enforce quality gate: only deploy if the CI tests passed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Trigger Dokploy Webhook
        run: |
          WEBHOOK_URL="${{ secrets.DOKPLOY_PRODUCTION_WEBHOOK_URL || vars.DOKPLOY_PRODUCTION_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: DOKPLOY_PRODUCTION_WEBHOOK_URL is not set."
            exit 1
          fi
          
          echo "Triggering deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL")
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "Deployment successfully triggered (HTTP $RESPONSE)."
          else
            echo "Failed to trigger deployment (HTTP $RESPONSE)."
            exit 1
          fi

      - name: Wait for Deployment to Initialize
        run: |
          echo "Waiting 60 seconds for Dokploy to pull, build, and deploy the new container..."
          sleep 60

      - name: Verify Backend Health
        run: |
          BACKEND_URL="${{ secrets.BACKEND_PRODUCTION_URL || vars.BACKEND_PRODUCTION_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "Error: BACKEND_PRODUCTION_URL is not set. Skipping health check."
            exit 0
          fi
          
          # Strip trailing slash if present
          BACKEND_URL="${BACKEND_URL%/}"
          HEALTH_URL="$BACKEND_URL/api/v1/auth/login"
          
          echo "Checking health at $HEALTH_URL..."
          
          # Retry mechanism: 6 attempts, 15 seconds apart
          SUCCESS=false
          for i in {1..6}; do
            echo "Attempt $i of 6..."
            
            # Send a request to the auth login endpoint.
            # A healthy app will respond with HTTP 405 (Method Not Allowed) or 400 (Bad Request)
            # instead of a connection error (000) or server error (5xx).
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            echo "Received HTTP Status: $HTTP_STATUS"
            
            if [ "$HTTP_STATUS" -eq 400 ] || [ "$HTTP_STATUS" -eq 405 ] || [ "$HTTP_STATUS" -eq 401 ] || [ "$HTTP_STATUS" -eq 403 ] || [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Backend is healthy and responding!"
              SUCCESS=true
              break
            fi
            
            echo "Server is not ready yet. Waiting 15 seconds..."
            sleep 15
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "Error: Backend failed health check verification after deployment."
            exit 1
          fi
