name: Backend CD

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=staging-latest,enable=${{ github.ref == format('refs/heads/{0}', 'dev') }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Dokploy Staging Deployment
        if: github.ref == 'refs/heads/dev'
        run: |
          curl -X GET "${{ secrets.DOKPLOY_STAGING_WEBHOOK_URL }}"
          echo "Triggered Staging deployment on Dokploy"

      - name: Trigger Dokploy Production Deployment
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X GET "${{ secrets.DOKPLOY_PRODUCTION_WEBHOOK_URL }}"
          echo "Triggered Production deployment on Dokploy"
